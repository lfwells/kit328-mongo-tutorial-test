# ./docker-compose.yaml
services:
  # 1. FRONTEND: Vite + React UI Layer
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-${REPO_NAME:-student-app}
    restart: always
    depends_on:
      - backend_api
    environment:
      - VITE_API_URL=/api
    networks:
      - caddy_network
    labels:
      # 🚀 Dynamic Subdomain: app1.kit328.ict.utas.edu.au
      caddy: ${REPO_NAME:-student-app}.kit328.ict.utas.edu.au

      # Route 1: Direct all /api/* requests straight to the backend container
      caddy.handle_path: /api*
      caddy.handle_path.reverse_proxy: "http://backend-${REPO_NAME:-student-app}:5000"

      # Route 2: Fallback for all other traffic (React app / static assets)
      caddy.handle: "/*"
      caddy.handle.reverse_proxy: "{{upstreams 3000}}"

  # 2. BACKEND: Node + Express API Layer
  backend_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-${REPO_NAME:-student-app}
    restart: always
    depends_on:
      - db_service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - MONGO_URI=mongodb://root:student_secure_pass@db_service:27017/student_db?authSource=admin
    networks:
      - caddy_network

  # 3. DATABASE: MongoDB Storage Layer
  db_service:
    image: mongo:7.0
    container_name: db-${REPO_NAME:-student-app}
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=student_secure_pass
    volumes:
      - student_mongo_data:/data/db
    networks:
      - caddy_network

networks:
  caddy_network:
    name: caddy_network
    external: ${IS_PRODUCTION:-false}

volumes:
  student_mongo_data:
    name: mongo_data_${REPO_NAME:-student_app}